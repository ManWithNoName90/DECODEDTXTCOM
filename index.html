<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECODED.TXT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-line"></div>
        
        <h1 class="terminal-title">DECODED.TXT</h1>
        
        <p class="terminal-text">Si has entrado aquí es porque alguien te quiere mandar un mensaje.</p>
        <p class="terminal-question">¿Qué mensaje tenía la camiseta?</p>
        
        <div class="input-group">
            <span class="prompt">></span>
            <input type="text" id="codeInput" placeholder="S-017" autocomplete="off" autofocus>
            <span class="cursor">_</span>
        </div>
        
        <p class="terminal-hint">Escribe el código público (ej: S-017, B-023, G-012)</p>
        
        <div class="terminal-actions">
            <a href="#" class="terminal-link">NO TENGO CÓDIGO → Ver galería</a>
        </div>
    </div>

    <div class="footer-label">DECODED.TXT</div>

    <script src="script.js"></script>
</body>
</html>
